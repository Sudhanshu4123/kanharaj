server:
  port: 8080

spring:
  application:
    name: luxeestates-backend
  
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 80MB
  
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/luxeestates?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:54321}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  cache:
    type: simple
  
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+5:30

