server:
  port: 8080
  tomcat:
    threads:
      max: 200
      min-spare: 10
    accept-count: 100
    max-connections: 5000
    connection-timeout: 20000

spring:
  application:
    name: luxeestates-backend
  
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 80MB
  
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/luxeestates?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:54321}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  cache:
    type: simple
  
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+5:30

  mail:
    # Actual SMTP is configured in MailConfig.java from MAIL_* env vars (.env / Docker env_file)
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:kanharaj1389@gmail.com}
    password: ${MAIL_PASSWORD:nbikpdffmjbdagca}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

jwt:
  secret: ${JWT_SECRET:CHANGE_ME_USE_64_CHAR_RANDOM_SECRET_IN_PRODUCTION}
  expiration: 86400000
  refresh-expiration: 604800000

