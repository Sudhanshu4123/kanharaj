version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: kanharaj-db
    restart: always
    environment:
      MYSQL_DATABASE: luxeestates
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-54321}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: kanharaj-backend
    restart: always
    env_file:
      - .env
    depends_on:
      - mysql
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/luxeestates?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-54321}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-change_me@email.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change_me_password}
      - ADMIN_NAME=${ADMIN_NAME:-Admin}
      - ADMIN_PHONE=${ADMIN_PHONE:-change_me_phone}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - JWT_SECRET=${JWT_SECRET:-luxeestates-secret-key-for-jwt-token-generation-2024}
      - API_URL=${API_URL:-http://localhost:8080/api}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:-rzp_live_SrVXmToc9GKOXJ}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET:-yT0gYlf3i10jc3x41PHtIIi4}
      # MAIL_* comes from env_file (.env) — do not duplicate here (empty override breaks OTP)
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${API_URL:-https://kanharaj.com/api}
        - NEXT_PUBLIC_SELLER_URL=${SELLER_URL:-https://seller.kanharaj.com}
        - NEXT_PUBLIC_RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:-}
        - INTERNAL_BACKEND_URL=http://backend:8080
    container_name: kanharaj-frontend
    restart: always
    environment:
      - INTERNAL_BACKEND_URL=http://backend:8080
      - NEXT_PUBLIC_API_URL=${API_URL:-https://kanharaj.com/api}
      - NEXT_PUBLIC_SELLER_URL=${SELLER_URL:-https://seller.kanharaj.com}
      - NEXT_PUBLIC_RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:-}
      - NEXTAUTH_SECRET=${JWT_SECRET:-luxeestates-secret-key-for-jwt-token-generation-2024}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://kanharaj.com}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  seller-frontend:
    build:
      context: ./seller-frontend
      args:
        - NEXT_PUBLIC_API_URL=${API_URL:-https://kanharaj.com/api}
        - NEXT_PUBLIC_MAIN_URL=${MAIN_URL:-https://kanharaj.com}
        - NEXT_PUBLIC_RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:-}
    container_name: kanharaj-seller
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=${API_URL:-https://kanharaj.com/api}
      - NEXT_PUBLIC_MAIN_URL=${MAIN_URL:-https://kanharaj.com}
      - NEXT_PUBLIC_RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:-}
      - NEXTAUTH_SECRET=${JWT_SECRET:-luxeestates-secret-key-for-jwt-token-generation-2024}
    ports:
      - "3001:3001"
    depends_on:
      - backend

  admin-frontend:
    build:
      context: ./admin-frontend
      args:
        - NEXT_PUBLIC_API_URL=${API_URL:-https://kanharaj.com/api}
        - NEXT_PUBLIC_MAIN_URL=${MAIN_URL:-https://kanharaj.com}
    container_name: kanharaj-admin
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=${API_URL:-https://kanharaj.com/api}
      - NEXT_PUBLIC_MAIN_URL=${MAIN_URL:-https://kanharaj.com}
    ports:
      - "3002:3002"
    depends_on:
      - backend

volumes:
  mysql_data:
  uploads_data:
